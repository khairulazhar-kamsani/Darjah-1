<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Belajar Super Genius</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background-color: #E0F7FA; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            max-width: 600px; 
            margin: 30px auto; 
            border: 6px solid #00BCD4; 
        }
        h1 { color: #0097A7; font-size: 28px; margin-top: 0; }
        .score { font-size: 20px; color: #E65100; margin-bottom: 20px; font-weight: bold; }
        
        /* Bahagian Menu Subjek */
        .menu-btn {
            background-color: #FFCA28;
            color: #333;
            border: none;
            padding: 15px 20px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px #FFB300;
            margin: 10px;
            width: 80%;
            max-width: 250px;
            font-weight: bold;
        }
        .menu-btn:active { box-shadow: 0 1px #FFB300; transform: translateY(3px); }

        /* Kotak Paparan */
        .content-box {
            background-color: #F5F5F5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 6px solid #00BCD4;
            text-align: left;
        }
        .text-display { font-size: 22px; color: #333; line-height: 1.6; }
        .title-display { color: #0097A7; font-size: 24px; font-weight: bold; margin-bottom: 10px; border-bottom: 2px dashed #ccc; padding-bottom: 5px; }
        
        /* Butang Jawapan & Navigasi */
        .btn-action { 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            box-shadow: 0 4px #388E3C; 
            margin: 8px;
            display: inline-block;
        }
        .btn-action:active { box-shadow: 0 1px #388E3C; transform: translateY(3px); }
        
        .input-jawapan {
            font-size: 24px;
            padding: 10px;
            width: 70%;
            text-align: center;
            border: 3px solid #64B5F6;
            border-radius: 10px;
            outline: none;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin-bottom: 10px;
        }

        .feedback { font-size: 24px; margin-top: 15px; font-weight: bold; min-height: 40px; }
        
        .btn-kembali {
            background-color: #F44336;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎒 Mari Belajar Tahun 1 ✨</h1>
        
        <div id="main-menu">
            <h2>Pilih Subjek Adik:</h2>
            <button class="menu-btn" onclick="pilihSubjek('Sains')">🔬 Sains</button>
            <button class="menu-btn" onclick="pilihSubjek('Matematik')">🧮 Matematik</button>
            <button class="menu-btn" onclick="pilihSubjek('BM')">📖 Bahasa Melayu</button>
        </div>

        <div id="learning-area" style="display: none;">
            <button class="btn-kembali" onclick="kembaliKeMenu()">⬅️ Tukar Subjek</button>
            <div class="score">Markah Kuiz: <span id="score">0</span> 🌟</div>
            
            <div class="content-box">
                <div class="title-display" id="display-title">Tajuk</div>
                <div class="text-display" id="display-text">Memuatkan teks...</div>
            </div>
            
            <div id="action-area"></div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <script>
        // PANGKALAN DATA SILIBUS (NOTA DAN SOALAN)
        const silibus = {
            "Sains": [
                { format: "nota", tajuk: "Bab 1: Benda Hidup", teks: "Benda hidup perlukan air, makanan dan udara untuk terus hidup. Benda hidup juga membesar dan bernafas.<br><br>Contoh: Kucing, Manusia, dan Pokok." },
                { format: "objektif", tajuk: "Uji Minda Sains", teks: "Antara berikut, yang manakah benda hidup?", options: ["Kerusi", "Batu", "Pokok"], answer: "Pokok" },
                { format: "subjektif", tajuk: "Uji Minda Sains", teks: "Benda hidup perlukan udara, makanan dan ____ ?", answer: "air" }
            ],
            "Matematik": [
                { format: "nota", tajuk: "Bab 1: Nombor hingga 100", teks: "Nombor menaik disusun dari nilai kecil ke nilai besar.<br><br>Contoh: 1, 2, 3, 4, 5." },
                { format: "objektif", tajuk: "Uji Minda Matematik", teks: "Apakah nombor selepas 10?", options: ["9", "11", "12"], answer: "11" },
                { format: "subjektif", tajuk: "Uji Minda Matematik", teks: "2 + 3 = ?", answer: "5" }
            ],
            "BM": [
                { format: "nota", tajuk: "Bab 1: Keluarga Saya", teks: "Keluarga asas terdiri daripada bapa, ibu, abang, kakak dan adik. Kita mesti hormat ahli keluarga kita." },
                { format: "objektif", tajuk: "Uji Minda BM", teks: "Ibu kepada ayah kita dipanggil apa?", options: ["Nenek", "Mak Cik", "Kakak"], answer: "Nenek" },
                { format: "subjektif", tajuk: "Uji Minda BM", teks: "Emak masak nasi di ceruk ____.", answer: "dapur" }
            ]
        };

        let currentSubjek = [];
        let currentIndex = 0;
        let currentScore = 0;

        // Fungsi Bunyi Automatik
        function mainkanBunyi(jenis) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (jenis === 'betul') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function pilihSubjek(namaSubjek) {
            currentSubjek = silibus[namaSubjek];
            currentIndex = 0;
            currentScore = 0;
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('learning-area').style.display = 'block';
            document.getElementById('score').innerText = currentScore;
            
            paparKandungan();
        }

        function kembaliKeMenu() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('learning-area').style.display = 'none';
        }

        function paparKandungan() {
            document.getElementById('feedback').innerText = "";
            
            if (currentIndex >= currentSubjek.length) {
                document.getElementById('display-title').innerText = "Tahniah! 🎉";
                document.getElementById('display-text').innerHTML = "Adik dah tamat belajar subjek ini! Markah akhir: <strong>" + currentScore + "</strong>";
                document.getElementById('action-area').innerHTML = '<button class="btn-action" onclick="kembaliKeMenu()">Pilih Subjek Lain</button>';
                return;
            }

            const item = currentSubjek[currentIndex];
            document.getElementById('display-title').innerText = item.tajuk;
            document.getElementById('display-text').innerHTML = item.teks;
            
            const actionArea = document.getElementById('action-area');
            
            // Format Nota (Hanya baca)
            if (item.format === "nota") {
                actionArea.innerHTML = `<button class="btn-action" style="background-color:#2196F3;" onclick="seterusnya()">Faham, Seterusnya! ➡️</button>`;
            } 
            // Format Kuiz Objektif
            else if (item.format === "objektif") {
                let optionsHtml = '';
                item.options.forEach(opt => {
                    optionsHtml += `<button class="btn-action" onclick="semakObjektif('${opt}', '${item.answer}')">${opt}</button>`;
                });
                actionArea.innerHTML = optionsHtml;
            } 
            // Format Kuiz Subjektif (Isi tempat kosong)
            else if (item.format === "subjektif") {
                actionArea.innerHTML = `
                    <input type="text" id="inputJawapan" class="input-jawapan" placeholder="Taip jawapan..." onkeyup="checkEnter(event, '${item.answer}')">
                    <br><button class="btn-action" onclick="semakSubjektif('${item.answer}')">Semak Jawapan</button>
                `;
                document.getElementById('inputJawapan').focus();
            }
        }

        function semakObjektif(selected, correct) {
            if (selected.toString().toLowerCase() === correct.toString().toLowerCase()) {
                jawabBetul();
            } else {
                jawabSalah();
            }
        }

        function semakSubjektif(correct) {
            const inputField = document.getElementById('inputJawapan').value.trim().toLowerCase();
            const jawapanSebenar = correct.toString().toLowerCase();
            
            if (inputField === "") {
                document.getElementById('feedback').innerText = "Sila taip jawapan dahulu ya! 😊";
                document.getElementById('feedback').style.color = "#FF9800";
                return;
            }

            if (inputField === jawapanSebenar) {
                jawabBetul();
            } else {
                jawabSalah();
            }
        }

        function checkEnter(event, correct) {
            if (event.key === "Enter") { semakSubjektif(correct); }
        }

        function jawabBetul() {
            mainkanBunyi('betul');
            currentScore += 10;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('feedback').innerText = "🌟 BETUL! Pandai sangat!";
            document.getElementById('feedback').style.color = "#4CAF50";
            
            // Sembunyikan butang sementara tunggu
            document.getElementById('action-area').innerHTML = ""; 
            setTimeout(() => { seterusnya(); }, 2000);
        }

        function jawabSalah() {
            mainkanBunyi('salah');
            document.getElementById('feedback').innerText = "❌ Alamak, cuba lagi sayang!";
            document.getElementById('feedback').style.color = "#F44336";
        }

        function seterusnya() {
            currentIndex++;
            paparKandungan();
        }
    </script>
</body>
</html>
