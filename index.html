<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Belajar Super Genius</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background-color: #E0F7FA; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            max-width: 600px; 
            margin: 30px auto; 
            border: 6px solid #00BCD4; 
        }
        h1 { color: #0097A7; font-size: 28px; margin-top: 0; }
        .score { font-size: 20px; color: #E65100; margin-bottom: 20px; font-weight: bold; }
        
        /* Bahagian Menu Subjek */
        .menu-btn {
            background-color: #FFCA28;
            color: #333;
            border: none;
            padding: 15px 20px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px #FFB300;
            margin: 10px;
            width: 80%;
            max-width: 250px;
            font-weight: bold;
        }
        .menu-btn:active { box-shadow: 0 1px #FFB300; transform: translateY(3px); }

        /* Kotak Paparan */
        .content-box {
            background-color: #F5F5F5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 6px solid #00BCD4;
            text-align: left;
        }
        .text-display { font-size: 22px; color: #333; line-height: 1.6; }
        .title-display { color: #0097A7; font-size: 24px; font-weight: bold; margin-bottom: 10px; border-bottom: 2px dashed #ccc; padding-bottom: 5px; }
        
        /* Butang Jawapan & Navigasi */
        .btn-action { 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            box-shadow: 0 4px #388E3C; 
            margin: 8px;
            display: inline-block;
        }
        .btn-action:active { box-shadow: 0 1px #388E3C; transform: translateY(3px); }
        
        .input-jawapan {
            font-size: 24px;
            padding: 10px;
            width: 70%;
            text-align: center;
            border: 3px solid #64B5F6;
            border-radius: 10px;
            outline: none;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin-bottom: 10px;
        }

        .feedback { font-size: 24px; margin-top: 15px; font-weight: bold; min-height: 40px; }
        
        .btn-kembali {
            background-color: #F44336;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎒 Mari Belajar Tahun 1 ✨</h1>
        
        <div id="main-menu">
            <h2>Pilih Subjek Adik:</h2>
            <button class="menu-btn" onclick="pilihSubjek('Sains')">🔬 Sains</button>
            <button class="menu-btn" onclick="pilihSubjek('Matematik')">🧮 Matematik</button>
            <button class="menu-btn" onclick="pilihSubjek('BM')">📖 Bahasa Melayu</button>
        </div>

        <div id="learning-area" style="display: none;">
            <button class="btn-kembali" onclick="kembaliKeMenu()">⬅️ Tukar Subjek</button>
            <div class="score">Markah Kuiz: <span id="score">0</span> 🌟</div>
            
            <div class="content-box">
                <div class="title-display" id="display-title">Tajuk</div>
                <div class="text-display" id="display-text">Memuatkan teks...</div>
            </div>
            
            <div id="action-area"></div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <script>
        // PANGKALAN DATA SILIBUS (NOTA DAN SOALAN)
        const silibus = {
            "Sains": [
                // --- BAB 1: BENDA HIDUP & BUKAN HIDUP ---
                { format: "nota", tajuk: "Bab 1: Benda Hidup", teks: "Benda hidup memerlukan air, makanan dan udara. Benda hidup juga bernafas, membesar dan membiak.<br><br>Contoh: Kucing, pokok, manusia.<br>Benda bukan hidup pula tidak bernafas (contoh: batu, kerusi)." },
                { format: "objektif", tajuk: "Uji Minda: Bab 1", teks: "Antara berikut, yang manakah benda hidup?", options: ["Kerusi", "Batu", "Burung"], answer: "Burung" },
                { format: "objektif", tajuk: "Uji Minda: Bab 1", teks: "Benda hidup perlukan makanan dan ______ untuk terus hidup.", options: ["Air", "Mainan", "Buku"], answer: "Air" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 1", teks: "Manusia bernafas menggunakan _____. (Taip udara / air)", answer: "udara" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 1", teks: "Adakah kereta benda hidup atau bukan hidup?", answer: "bukan hidup" },
                { format: "objektif", tajuk: "Uji Minda: Bab 1", teks: "Benda hidup akan menjadi lebih besar. Ini dipanggil...", options: ["Membesar", "Mengecil", "Tidur"], answer: "Membesar" },

                // --- BAB 2: PERATURAN BILIK SAINS ---
                { format: "nota", tajuk: "Bab 2: Peraturan Bilik Sains", teks: "Kita mesti patuh peraturan di bilik sains untuk keselamatan.<br>1. Beratur sebelum masuk.<br>2. Jangan berlari atau bermain.<br>3. Minta izin guru sebelum guna peralatan." },
                { format: "objektif", tajuk: "Uji Minda: Bab 2", teks: "Apa yang perlu kita buat sebelum masuk ke bilik sains?", options: ["Bermain", "Beratur", "Makan"], answer: "Beratur" },
                { format: "objektif", tajuk: "Uji Minda: Bab 2", teks: "Bolehkah kita makan di dalam bilik sains?", options: ["Boleh", "Tidak Boleh", "Kadang-kadang"], answer: "Tidak Boleh" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 2", teks: "Kita mesti membuang sampah ke dalam tong ______.", answer: "sampah" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 2", teks: "Minta _____ guru sebelum menggunakan alatan sains.", answer: "izin" },
                { format: "objektif", tajuk: "Uji Minda: Bab 2", teks: "Jika gelas pecah di bilik sains, kita mesti...", options: ["Kutip sendiri", "Biar sahaja", "Beritahu guru"], answer: "Beritahu guru" },

                // --- BAB 3: DERIA MANUSIA ---
                { format: "nota", tajuk: "Bab 3: Deria Manusia", teks: "Manusia ada 5 deria penting:<br>Mata = Melihat<br>Hidung = Menghidu bau<br>Telinga = Mendengar<br>Lidah = Merasa (manis, masin, pahit)<br>Kulit = Menyentuh (kasar, lembut, panas)." },
                { format: "objektif", tajuk: "Uji Minda: Bab 3", teks: "Kita mendengar bunyi radio menggunakan...", options: ["Mata", "Telinga", "Hidung"], answer: "Telinga" },
                { format: "objektif", tajuk: "Uji Minda: Bab 3", teks: "Apakah rasa buah lemon?", options: ["Manis", "Masam", "Masin"], answer: "Masam" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 3", teks: "Kita menggunakan organ _____ untuk melihat bunga.", answer: "mata" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 3", teks: "Bunga mawar berbau wangi. Kita menghidunya menggunakan organ ____.", answer: "hidung" },
                { format: "objektif", tajuk: "Uji Minda: Bab 3", teks: "Permukaan batu terasa...", options: ["Kasar", "Lembut", "Licin"], answer: "Kasar" },

                // --- BAB 4: HAIWAN ---
                { format: "nota", tajuk: "Bab 4: Haiwan", teks: "Haiwan mempunyai pelbagai bahagian tubuh.<br>- Burung ada sayap dan paruh.<br>- Ikan ada sirip dan sisik.<br>- Lembu ada tanduk dan bulu halus.<br>- Katak ada kulit lembap." },
                { format: "objektif", tajuk: "Uji Minda: Bab 4", teks: "Haiwan manakah yang mempunyai sayap untuk terbang?", options: ["Burung", "Kucing", "Ikan"], answer: "Burung" },
                { format: "objektif", tajuk: "Uji Minda: Bab 4", teks: "Bahagian badan ikan yang membantunya berenang ialah...", options: ["Kaki", "Sirip", "Tanduk"], answer: "Sirip" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 4", teks: "Lembu dan kambing mempunyai _____ di atas kepala mereka.", answer: "tanduk" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 4", teks: "Itik mempunyai _____ untuk mematuk makanan.", answer: "paruh" },
                { format: "objektif", tajuk: "Uji Minda: Bab 4", teks: "Kura-kura mempunyai bahagian badan yang keras untuk melindungi dirinya, iaitu...", options: ["Bulu", "Cengkerang", "Sisik"], answer: "Cengkerang" },

                // --- BAB 5: TUMBUHAN ---
                { format: "nota", tajuk: "Bab 5: Tumbuhan", teks: "Bahagian utama tumbuhan ialah Daun, Bunga, Batang, dan Akar.<br>Akar ada dua jenis: Akar tunjang (besar) dan Akar serabut (banyak/halus).<br>Daun pula ada urat jejala (berselirat) dan urat selari (lurus)." },
                { format: "objektif", tajuk: "Uji Minda: Bab 5", teks: "Bahagian tumbuhan yang biasanya berwarna warni dan wangi ialah...", options: ["Akar", "Batang", "Bunga"], answer: "Bunga" },
                { format: "objektif", tajuk: "Uji Minda: Bab 5", teks: "Pokok kelapa mempunyai jenis akar...", options: ["Tunjang", "Serabut", "Keras"], answer: "Serabut" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 5", teks: "Bahagian tumbuhan yang berada di dalam tanah ialah ____.", answer: "akar" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 5", teks: "Pokok pandan mempunyai daun berurat _____ (jejalar / selari).", answer: "selari" },
                { format: "objektif", tajuk: "Uji Minda: Bab 5", teks: "Tumbuhan yang mempunyai batang berkayu ialah...", options: ["Pokok Mangga", "Pokok Pisang", "Rumput"], answer: "Pokok Mangga" },

                // --- BAB 6: MAGNET ---
                { format: "nota", tajuk: "Bab 6: Magnet", teks: "Magnet boleh menarik objek besi (seperti paku, klip kertas). Magnet tidak menarik plastik atau kayu.<br>Magnet ada pelbagai bentuk: Bar, Ladam, Cincin, Butang, dan Silinder.<br>Kutub magnet yang sama akan MENOLAK, yang berbeza akan MENARIK." },
                { format: "objektif", tajuk: "Uji Minda: Bab 6", teks: "Antara berikut, objek manakah yang ditarik oleh magnet?", options: ["Pemadam", "Klip Kertas", "Buku"], answer: "Klip Kertas" },
                { format: "objektif", tajuk: "Uji Minda: Bab 6", teks: "Magnet berbentuk seperti huruf 'U' dipanggil magnet...", options: ["Bar", "Cincin", "Ladam"], answer: "Ladam" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 6", teks: "Magnet mempunyai keupayaan untuk _______ objek yang diperbuat daripada besi.", answer: "menarik" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 6", teks: "Adakah pensel kayu akan ditarik oleh magnet? (Ya / Tidak)", answer: "tidak" },
                { format: "objektif", tajuk: "Uji Minda: Bab 6", teks: "Dua kutub magnet yang SAMA jenis jika didekatkan akan...", options: ["Menolak", "Menarik", "Melekat"], answer: "Menolak" },

                // --- BAB 7: PENYERAPAN ---
                { format: "nota", tajuk: "Bab 7: Penyerapan", teks: "Objek menyerap air: Tisu, kain kapas, span, kertas.<br>Objek tidak menyerap air: Plastik, kaca, besi, getah.<br>Objek tidak menyerap air sangat penting untuk buat payung atau baju hujan." },
                { format: "objektif", tajuk: "Uji Minda: Bab 7", teks: "Yang manakah bahan yang menyerap air?", options: ["Sudu Besi", "Kain Tuala", "Cawan Kaca"], answer: "Kain Tuala" },
                { format: "objektif", tajuk: "Uji Minda: Bab 7", teks: "Untuk mengelap air teh yang tumpah, kita patut guna...", options: ["Kertas Tisu", "Plastik", "Pemadam"], answer: "Kertas Tisu" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 7", teks: "Span ______ air dengan sangat baik.", answer: "menyerap" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 7", teks: "Baju hujan diperbuat daripada bahan yang ______ menyerap air.", answer: "tidak" },
                { format: "objektif", tajuk: "Uji Minda: Bab 7", teks: "Mengapakah payung dibuat daripada plastik?", options: ["Sebab ia cantik", "Sebab ia tidak menyerap air", "Sebab ia ringan"], answer: "Sebab ia tidak menyerap air" },

                // --- BAB 8: BENTUK MUKA BUMI ---
                { format: "nota", tajuk: "Bab 8: Bentuk Muka Bumi", teks: "Bentuk muka bumi di sekeliling kita termasuklah:<br>Gunung (sangat tinggi), Bukit (kurang tinggi), Lembah (kawasan rendah antara bukit), Laut, Pantai, Sungai dan Tasik." },
                { format: "objektif", tajuk: "Uji Minda: Bab 8", teks: "Kawasan air masin yang sangat luas dikenali sebagai...", options: ["Sungai", "Tasik", "Laut"], answer: "Laut" },
                { format: "objektif", tajuk: "Uji Minda: Bab 8", teks: "Kawasan tanah tinggi yang paling tinggi ialah...", options: ["Gunung", "Bukit", "Pantai"], answer: "Gunung" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 8", teks: "Kawasan tanah lapang yang berpasir di tepi laut dipanggil ______.", answer: "pantai" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 8", teks: "Kawasan rendah di antara dua buah bukit atau gunung dipanggil ______.", answer: "lembah" },
                { format: "objektif", tajuk: "Uji Minda: Bab 8", teks: "Air yang mengalir turun dari kawasan tinggi ke laut dipanggil...", options: ["Pantai", "Tasik", "Sungai"], answer: "Sungai" },

                // --- BAB 9: TANAH ---
                { format: "nota", tajuk: "Bab 9: Tanah", teks: "Terdapat 3 jenis tanah utama untuk pokok:<br>1. Tanah Kebun (warna hitam, baik untuk tanam sayur).<br>2. Tanah Liat (warna kemerahan, sentiasa basah, untuk pokok padi).<br>3. Pasir (di tepi laut, untuk pokok kelapa)." },
                { format: "objektif", tajuk: "Uji Minda: Bab 9", teks: "Pokok padi sangat sesuai ditanam di dalam...", options: ["Tanah Liat", "Pasir", "Batu"], answer: "Tanah Liat" },
                { format: "objektif", tajuk: "Uji Minda: Bab 9", teks: "Tanah yang sangat sesuai untuk menanam sayur-sayuran ialah...", options: ["Pasir", "Tanah Kebun", "Tanah Liat"], answer: "Tanah Kebun" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 9", teks: "Pokok kelapa dan kaktus banyak tumbuh di kawasan tanah jenis _______.", answer: "pasir" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 9", teks: "Batu-batu kecil banyak dijumpai di dalam tanah ______.", answer: "kebun" },
                { format: "objektif", tajuk: "Uji Minda: Bab 9", teks: "Tanah yang paling halus dan melekit bila basah ialah...", options: ["Tanah Liat", "Pasir", "Tanah Kebun"], answer: "Tanah Liat" },

                // --- BAB 10: ASAS BINAAN ---
                { format: "nota", tajuk: "Bab 10: Asas Binaan", teks: "Terdapat pelbagai bentuk bongkah asas binaan:<br>1. Kubus (seperti dadu).<br>2. Kuboid (seperti kotak kasut).<br>3. Sfera (seperti bola).<br>4. Piramid (seperti bumbung khemah/Mesir).<br>5. Silinder (seperti tin minuman)." },
                { format: "objektif", tajuk: "Uji Minda: Bab 10", teks: "Bongkah yang manakah berbentuk seperti sebiji bola?", options: ["Sfera", "Silinder", "Kubus"], answer: "Sfera" },
                { format: "objektif", tajuk: "Uji Minda: Bab 10", teks: "Tin minuman kordial mempunyai bentuk bongkah...", options: ["Piramid", "Kuboid", "Silinder"], answer: "Silinder" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 10", teks: "Dadu permainan ular dan tangga berbentuk _______.", answer: "kubus" },
                { format: "subjektif", tajuk: "Uji Minda: Bab 10", teks: "Kotak kasut atau peti sejuk biasanya berbentuk _______.", answer: "kuboid" },
                { format: "objektif", tajuk: "Uji Minda: Bab 10", teks: "Bongkah yang mempunyai tapak segi empat dan bucu tajam di atas ialah...", options: ["Sfera", "Silinder", "Piramid"], answer: "Piramid" }
            ],
            "Matematik": [
                { format: "nota", tajuk: "Bab 1: Nombor hingga 100", teks: "Nombor menaik disusun dari nilai kecil ke nilai besar.<br><br>Contoh: 1, 2, 3, 4, 5." },
                { format: "objektif", tajuk: "Uji Minda Matematik", teks: "Apakah nombor selepas 10?", options: ["9", "11", "12"], answer: "11" },
                { format: "subjektif", tajuk: "Uji Minda Matematik", teks: "2 + 3 = ?", answer: "5" }
            ],
            "BM": [
                { format: "nota", tajuk: "Bab 1: Keluarga Saya", teks: "Keluarga asas terdiri daripada bapa, ibu, abang, kakak dan adik. Kita mesti hormat ahli keluarga kita." },
                { format: "objektif", tajuk: "Uji Minda BM", teks: "Ibu kepada ayah kita dipanggil apa?", options: ["Nenek", "Mak Cik", "Kakak"], answer: "Nenek" },
                { format: "subjektif", tajuk: "Uji Minda BM", teks: "Emak masak nasi di ceruk ____.", answer: "dapur" }
            ]
        };

        let currentSubjek = [];
        let currentIndex = 0;
        let currentScore = 0;

        // Fungsi Bunyi Automatik
        function mainkanBunyi(jenis) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (jenis === 'betul') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function pilihSubjek(namaSubjek) {
            currentSubjek = silibus[namaSubjek];
            currentIndex = 0;
            currentScore = 0;
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('learning-area').style.display = 'block';
            document.getElementById('score').innerText = currentScore;
            
            paparKandungan();
        }

        function kembaliKeMenu() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('learning-area').style.display = 'none';
        }

        function paparKandungan() {
            document.getElementById('feedback').innerText = "";
            
            if (currentIndex >= currentSubjek.length) {
                document.getElementById('display-title').innerText = "Tahniah! 🎉";
                document.getElementById('display-text').innerHTML = "Adik dah tamat belajar subjek ini! Markah akhir: <strong>" + currentScore + "</strong>";
                document.getElementById('action-area').innerHTML = '<button class="btn-action" onclick="kembaliKeMenu()">Pilih Subjek Lain</button>';
                return;
            }

            const item = currentSubjek[currentIndex];
            document.getElementById('display-title').innerText = item.tajuk;
            document.getElementById('display-text').innerHTML = item.teks;
            
            const actionArea = document.getElementById('action-area');
            
            // Format Nota (Hanya baca)
            if (item.format === "nota") {
                actionArea.innerHTML = `<button class="btn-action" style="background-color:#2196F3;" onclick="seterusnya()">Faham, Seterusnya! ➡️</button>`;
            } 
            // Format Kuiz Objektif
            else if (item.format === "objektif") {
                let optionsHtml = '';
                item.options.forEach(opt => {
                    optionsHtml += `<button class="btn-action" onclick="semakObjektif('${opt}', '${item.answer}')">${opt}</button>`;
                });
                actionArea.innerHTML = optionsHtml;
            } 
            // Format Kuiz Subjektif (Isi tempat kosong)
            else if (item.format === "subjektif") {
                actionArea.innerHTML = `
                    <input type="text" id="inputJawapan" class="input-jawapan" placeholder="Taip jawapan..." onkeyup="checkEnter(event, '${item.answer}')">
                    <br><button class="btn-action" onclick="semakSubjektif('${item.answer}')">Semak Jawapan</button>
                `;
                document.getElementById('inputJawapan').focus();
            }
        }

        function semakObjektif(selected, correct) {
            if (selected.toString().toLowerCase() === correct.toString().toLowerCase()) {
                jawabBetul();
            } else {
                jawabSalah();
            }
        }

        function semakSubjektif(correct) {
            const inputField = document.getElementById('inputJawapan').value.trim().toLowerCase();
            const jawapanSebenar = correct.toString().toLowerCase();
            
            if (inputField === "") {
                document.getElementById('feedback').innerText = "Sila taip jawapan dahulu ya! 😊";
                document.getElementById('feedback').style.color = "#FF9800";
                return;
            }

            if (inputField === jawapanSebenar) {
                jawabBetul();
            } else {
                jawabSalah();
            }
        }

        function checkEnter(event, correct) {
            if (event.key === "Enter") { semakSubjektif(correct); }
        }

        function jawabBetul() {
            mainkanBunyi('betul');
            currentScore += 10;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('feedback').innerText = "🌟 BETUL! Pandai sangat!";
            document.getElementById('feedback').style.color = "#4CAF50";
            
            // Sembunyikan butang sementara tunggu
            document.getElementById('action-area').innerHTML = ""; 
            setTimeout(() => { seterusnya(); }, 2000);
        }

        function jawabSalah() {
            mainkanBunyi('salah');
            document.getElementById('feedback').innerText = "❌ Alamak, cuba lagi sayang!";
            document.getElementById('feedback').style.color = "#F44336";
        }

        function seterusnya() {
            currentIndex++;
            paparKandungan();
        }
    </script>
</body>
</html>
