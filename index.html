<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Belajar Super Genius</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: Arial, sans-serif; 
            background-color: #E0F7FA; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            max-width: 600px; 
            margin: 30px auto; 
            border: 6px solid #00BCD4; 
        }
        h1 { color: #0097A7; font-size: 28px; margin-top: 0; }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #FFF3E0;
            border-radius: 15px;
            border: 2px dashed #FF9800;
        }
        .score { font-size: 20px; color: #E65100; font-weight: bold; margin: 0; }
        .timer { font-size: 20px; color: #D32F2F; font-weight: bold; margin: 0; }
        .timer.warning { color: #B71C1C; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }
        
        .menu-btn {
            background-color: #FFCA28;
            color: #333;
            border: none;
            padding: 15px 20px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px #FFB300;
            margin: 10px;
            width: 80%;
            max-width: 250px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .menu-btn:active { box-shadow: 0 1px #FFB300; transform: translateY(3px); }

        .menu-btn:disabled {
            background-color: #B0BEC5 !important;
            color: #78909C !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
            transform: none !important;
        }

        .content-box {
            background-color: #F5F5F5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 6px solid #00BCD4;
            text-align: left;
        }
        .text-display { font-size: 22px; color: #333; line-height: 1.6; }
        .title-display { color: #0097A7; font-size: 24px; font-weight: bold; margin-bottom: 10px; border-bottom: 2px dashed #ccc; padding-bottom: 5px; }
        
        .btn-action { 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            box-shadow: 0 4px #388E3C; 
            margin: 8px;
            display: inline-block;
        }
        .btn-action:active { box-shadow: 0 1px #388E3C; transform: translateY(3px); }
        
        .input-jawapan {
            font-size: 24px;
            padding: 10px;
            width: 70%;
            text-align: center;
            border: 3px solid #64B5F6;
            border-radius: 10px;
            outline: none;
            font-family: Arial, sans-serif;
            margin-bottom: 10px;
        }

        .feedback { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 40px; }

        .report-card {
            background-color: #FFF9C4;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 4px solid #FBC02D;
        }
        .report-card h2 { margin-top: 0; color: #F57F17; }
        .report-card .mark { font-size: 36px; color: #2E7D32; font-weight: bold; margin: 15px 0; }
        .report-card p { font-size: 20px; color: #555; margin: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎒 Mari Belajar Tahun 1 ✨</h1>
        
        <div id="main-menu">
            <h2>Pilih Subjek Adik:</h2>

            <div id="action-area"></div>

        let currentSubjek = [];

        function mainkanBunyi(jenis) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (jenis === 'betul') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else if (jenis === 'salah') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (jenis === 'tamat') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 1.5);
            } else if (jenis === 'menang') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); 
                oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.4); 
                oscillator.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.6); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 1.5);
            }
        }

        function mulaMasa() {
            masaTinggal = 600; 
            kemaskiniPaparanMasa();
            document.getElementById('timer-box').classList.remove('warning');
            
            timerInterval = setInterval(() => {
                masaTinggal--;
                kemaskiniPaparanMasa();
                if (masaTinggal <= 60) document.getElementById('timer-box').classList.add('warning');
                if (masaTinggal <= 0) {
                    hentiMasa();
                    tunjukReportKad('masa'); 
                }
            }, 1000);
        }

        function hentiMasa() { clearInterval(timerInterval); }

        function kemaskiniPaparanMasa() {
            let minit = Math.floor(masaTinggal / 60);
            let saat = masaTinggal % 60;
            if (minit < 10) minit = "0" + minit;
            if (saat < 10) saat = "0" + saat;
            document.getElementById('timer').innerText = minit + ":" + saat;
        }

        function kocokArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function pilihSubjek(namaSubjek) {
            namaSubjekSemasa = namaSubjek; 
            let dataSubjek = silibus[namaSubjek];
            
            let senaraiNota = dataSubjek.filter(item => item.format === "nota");
            let senaraiSoalan = dataSubjek.filter(item => item.format !== "nota");
            
            senaraiSoalan = kocokArray(senaraiSoalan);
            senaraiSoalan = senaraiSoalan.slice(0, 10);
            
            currentSubjek = senaraiNota.concat(senaraiSoalan);
            
            currentIndex = 0;
            currentScore = 0;
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('learning-area').style.display = 'block';
            document.getElementById('score').innerText = currentScore;
            document.getElementById('display-title').style.color = "#0097A7";
            
            hentiMasa();
            mulaMasa(); 
            paparKandungan();
        }

                    mesejMotivasi = "Adik perlukan sekurang-kurangnya 80 markah. Jom buat lagi!";
                }
            }
            
            document.getElementById('display-title').innerText = tajukMesej;
            document.getElementById('display-title').style.color = warnaTajuk;
            document.getElementById('feedback').innerText = "";
            
            let htmlLaporan = `
                <div class="report-card">
                    <h2>Kad Laporan Ujian</h2>
                    <p>Subjek ${namaSubjekSemasa}</p>
                    <div class="mark" style="color:${warnaTajuk}">${currentScore} / ${markahPenuh}</div>
                    <p>${mesejMotivasi}</p>
                </div>
            `;
            
            document.getElementById('display-text').innerHTML = htmlLaporan;
            document.getElementById('action-area').innerHTML = '<button class="btn-action" style="background-color:#FF9800; margin-top:20px;" onclick="kembaliKeMenu()">Kembali Ke Menu</button>';
        }

        function paparKandungan() {
            dahJawab = false; 
            document.getElementById('feedback').innerText = "";
            document.getElementById('action-area').style.opacity = "1"; 
            
            if (currentIndex >= currentSubjek.length) {
                tunjukReportKad('selesai'); 
                return;
            }

            const item = currentSubjek[currentIndex];
            document.getElementById('display-title').innerText = item.tajuk;
            document.getElementById('display-text').innerHTML = item.teks;
            
            const actionArea = document.getElementById('action-area');
            
            if (item.format === "nota") {
                actionArea.innerHTML = `<button class="btn-action" style="background-color:#2196F3;" onclick="seterusnya()">Faham, Seterusnya! ➡️</button>`;
            } 
            else if (item.format === "objektif") {
                let optionsHtml = '';
                let pilihanRawak = kocokArray([...item.options]);
                
                pilihanRawak.forEach(opt => {
                    optionsHtml += `<button class="btn-action" onclick="semakObjektif('${opt}', '${item.answer}')">${opt}</button>`;
                });
                actionArea.innerHTML = optionsHtml;
            } 
            else if (item.format === "subjektif") {
                actionArea.innerHTML = `
                    <input type="text" id="inputJawapan" class="input-jawapan" placeholder="Taip jawapan..." onkeyup="checkEnter(event, '${item.answer}')">
                    <br><button class="btn-action" onclick="semakSubjektif('${item.answer}')">Semak Jawapan</button>
                `;
                document.getElementById('inputJawapan').focus();
            }
        }

        function semakObjektif(selected, correct) {
            if (dahJawab) return; 
            
            if (selected.toString().toLowerCase() === correct.toString().toLowerCase()) {
                jawabBetul();
            } else {
                jawabSalah(correct); 
            }
        }

        function semakSubjektif(correct) {
            if (dahJawab) return; 

            const inputField = document.getElementById('inputJawapan').value.trim().toLowerCase();
            const jawapanSebenar = correct.toString().toLowerCase();
            
            if (inputField === "") {
                document.getElementById('feedback').innerText = "Sila taip jawapan dahulu ya! 😊";
                document.getElementById('feedback').style.color = "#FF9800";
                return;
            }

            if (inputField === jawapanSebenar) {
                jawabBetul();
            } else {
                jawabSalah(correct); 
            }
        }

        function checkEnter(event, correct) {
            if (event.key === "Enter") { semakSubjektif(correct); }
        }

        function jawabBetul() {
            dahJawab = true; 
            mainkanBunyi('betul');
            currentScore += 10;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('feedback').innerText = "🌟 BETUL! Pandai sangat!";
            document.getElementById('feedback').style.color = "#4CAF50";
            
            document.getElementById('action-area').style.opacity = "0.4"; 
            setTimeout(() => { seterusnya(); }, 1500); 
        }

        function jawabSalah(jawapanSebenar) {
            dahJawab = true; 
            mainkanBunyi('salah');
            
            document.getElementById('feedback').innerHTML = "❌ Salah sayang!<br>Jawapan sebenar: <strong>" + jawapanSebenar + "</strong>";
            document.getElementById('feedback').style.color = "#F44336";
            
            document.getElementById('action-area').style.opacity = "0.4"; 
            setTimeout(() => { seterusnya(); }, 3000); 
        }

        function seterusnya() {
            currentIndex++;
            paparKandungan();
        }
    </script>
</body>
</html>
