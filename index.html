<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Super Genius</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background-color: #FFF9E6; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            max-width: 550px; 
            margin: 30px auto; 
            border: 6px solid #FFB74D; 
        }
        h1 { color: #E65100; font-size: 28px; margin-top: 0; }
        .score { font-size: 20px; color: #1E88E5; margin-bottom: 20px; font-weight: bold; }
        
        /* Kotak Soalan */
        .question-box {
            background-color: #F5F5F5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 6px solid #FFB74D;
        }
        .question { font-size: 24px; color: #333; line-height: 1.5; }
        
        /* Bahagian Pilihan Jawapan (Objektif) */
        .options { 
            display: block; 
        }
        .btn-opt { 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 22px; 
            border-radius: 12px; 
            cursor: pointer; 
            box-shadow: 0 4px #388E3C; 
            margin: 8px;
            width: 80%;
            max-width: 200px;
            display: inline-block;
        }
        .btn-opt:active { 
            box-shadow: 0 1px #388E3C; 
            transform: translateY(3px); 
        }
        
        /* Bahagian Input Jawapan (Subjektif) */
        .subjective-box {
            margin: 20px 0;
        }
        .input-jawapan {
            font-size: 26px;
            padding: 10px;
            width: 150px;
            text-align: center;
            border: 3px solid #64B5F6;
            border-radius: 10px;
            outline: none;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .btn-hantar {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 22px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px #1976D2;
            margin-left: 10px;
            vertical-align: top;
        }
        .btn-hantar:active {
            box-shadow: 0 1px #1976D2;
            transform: translateY(3px);
        }

        /* Bunyi & Maklumbalas */
        .feedback { font-size: 26px; margin-top: 15px; font-weight: bold; min-height: 40px; }
        
        .btn-mula {
            background-color: #FF5722;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px #E64A19;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎒 Matematik Darjah 1 ✨</h1>
        <div class="score">Markah Adik: <span id="score">0</span> 🌟</div>
        
        <div id="game-area">
            <div class="question-box">
                <div class="question" id="question">Adakah adik sedia nak belajar?</div>
            </div>
            <div id="action-area">
                <button class="btn-mula" onclick="startGame()">Mula Sekarang!</button>
            </div>
        </div>
        
        <div class="feedback" id="feedback"></div>
    </div>

    <script>
        let currentScore = 0;
        let currentQuestionIndex = 0;
        
        // REKOD SOALAN DI SINI
        const questions = [
            { format: "objektif", q: "4 + 5 = ?", options: [8, 9, 10], answer: 9 },
            { format: "objektif", q: "Ali ada 3 biji epal. Abu beri lagi 4 biji epal kepada Ali. Berapa jumlah epal Ali sekarang?", options: [6, 7, 8], answer: 7 },
            { format: "subjektif", q: "Siti beli 10 biji kek cawan. Dia makan 3 biji. Berapa biji kek cawan yang tinggal?", answer: 7 },
            { format: "subjektif", q: "15 - 5 = ?", answer: 10 },
            { format: "objektif", q: "Di dalam reban ada 6 ekor ayam. 2 ekor ayam telah keluar mencari makan. Berapa ayam yang tinggal di dalam reban?", options: [4, 5, 8], answer: 4 }
        ];

        // FUNGSI JANA BUNYI AUTOMATIK (100% Percuma, Tanpa Fail)
        function mainkanBunyi(jenis) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (jenis === 'betul') {
                oscillator.type = 'sine'; // Bunyi nyaring dan lembut
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'square'; // Bunyi amaran / buzzer
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function startGame() {
            currentScore = 0;
            currentQuestionIndex = 0;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('feedback').innerText = "";
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestionIndex >= questions.length) {
                document.getElementById('question').innerText = "Hebatnya adik! Semua soalan dah selesai! 🎉";
                document.getElementById('action-area').innerHTML = '<button class="btn-mula" onclick="startGame()">Main Semula</button>';
                return;
            }

            const currentQ = questions[currentQuestionIndex];
            document.getElementById('question').innerText = currentQ.q;
            
            const actionArea = document.getElementById('action-area');
            
            if (currentQ.format === "objektif") {
                let optionsHtml = '<div class="options">';
                currentQ.options.forEach(opt => {
                    optionsHtml += `<button class="btn-opt" onclick="checkObjektif(${opt}, ${currentQ.answer})">${opt}</button>`;
                });
                optionsHtml += '</div>';
                actionArea.innerHTML = optionsHtml;
            } 
            else if (currentQ.format === "subjektif") {
                actionArea.innerHTML = `
                    <div class="subjective-box">
                        <input type="number" id="inputJawapan" class="input-jawapan" placeholder="?" min="0" onkeyup="checkEnter(event)">
                        <button class="btn-hantar" onclick="checkSubjektif(${currentQ.answer})">Semak</button>
                    </div>
                `;
                document.getElementById('inputJawapan').focus();
            }
        }

        function checkObjektif(selected, correct) {
            if (selected === correct) {
                jawabBetul();
            } else {
                jawabSalah();
            }
        }

        function checkSubjektif(correct) {
            const inputField = document.getElementById('inputJawapan');
            const jawapanAnak = parseInt(inputField.value);
            
            if (isNaN(jawapanAnak)) {
                document.getElementById('feedback').innerText = "Sila taip nombor dahulu ya! 😊";
                document.getElementById('feedback').style.color = "#FF9800";
                return;
            }

            if (jawapanAnak === correct) {
                jawabBetul();
            } else {
                jawabSalah();
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                const currentQ = questions[currentQuestionIndex];
                checkSubjektif(currentQ.answer);
            }
        }

        function jawabBetul() {
            mainkanBunyi('betul'); // Panggil fungsi bunyi dari kod

            currentScore += 10;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('feedback').innerText = "🌟 BETUL! Pandai sangat!";
            document.getElementById('feedback').style.color = "#4CAF50";
            seterusnya();
        }

        function jawabSalah() {
            mainkanBunyi('salah'); // Panggil fungsi bunyi dari kod

            document.getElementById('feedback').innerText = "❌ Alamak, cuba lagi sayang!";
            document.getElementById('feedback').style.color = "#F44336";
            seterusnya();
        }

        function seterusnya() {
            currentQuestionIndex++;
            setTimeout(() => {
                document.getElementById('feedback').innerText = "";
                showQuestion();
            }, 2000);
        }
    </script>
</body>
</html>
